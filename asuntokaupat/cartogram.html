<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asuntokaupat – karttavisualisaatio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: sans-serif;
        background: #f9f9f7;
        margin: 0;
        padding: 0;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        background: #f9f9f7;
        padding: 20px 20px 8px;
      }
      h2 {
        margin-bottom: 4px;
      }
      h3 {
        margin-top: 0;
        font-weight: normal;
        color: #555;
      }
      .bubble {
        stroke: #fff;
        stroke-width: 1.5;
        opacity: 0.88;
        cursor: default;
      }
      .bubble:hover {
        opacity: 1;
        stroke-width: 2.5;
      }
      .label-name {
        font-size: 11px;
        fill: #222;
        font-weight: 600;
        pointer-events: none;
      }
      .label-pct {
        font-size: 12px;
        fill: #000;
        font-weight: 700;
        pointer-events: none;
      }
      .legend-title {
        font-size: 11px;
        fill: #555;
      }
      .footnote {
        font-size: 12px;
        color: #888;
        padding: 12px 20px 20px;
      }

      /* ── Story text ── */
      .story-text {
        max-width: 640px;
        margin: 0 auto;
        padding: 40px 20px;
        font-size: 16px;
        line-height: 1.6;
        color: #333;
      }

      /* ── Scroll layout ── */
      .scrolly-zone {
        position: relative;
      }
      .sticky-chart {
        position: sticky;
        top: 0; /* overridden by JS to header height */
        height: 100vh; /* overridden by JS */
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .chart-row {
        display: flex;
        align-items: center;
        gap: 24px;
        max-width: 1200px;
      }
      .chart-row #chart {
        flex: 1;
        min-width: 0;
      }
      .chart-row #chart svg {
        max-width: 100%;
        height: auto;
      }
      .bars-panel {
        flex: 0 0 220px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
    </style>
  </head>
  <body>
    <div class="story-text">
      <p><!-- intro text before chart --></p>
    </div>

    <div id="scrolly-1" class="scrolly-zone">
      <header>
        <h2>Asuntojen myyntiluvuissa nousua – kuntien välillä eroja</h2>
        <h3>Asuntokauppojen määrä 1–9/2025, %-muutos viime vuodesta</h3>
        <p style="font-size: 13px; color: #666; margin-top: 0">
          Ympyrän koko = väestö. Väri = myynnin kasvu (vaalea → tumma sininen).
        </p>
      </header>
      <div class="sticky-chart">
        <div class="chart-row">
          <div id="chart"></div>
          <div class="bars-panel">
            <div id="chart-pk"></div>
            <div id="chart-uusimaa"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="story-text">
      <p><!-- analysis text after chart --></p>
    </div>

    <p class="footnote">
      Lähteet: KVKL, OP Uusimaa, Tilastokeskus. Tekijä: Julius Uusikylä
    </p>

    <script>
      // Offset sticky-chart so it never slides under the sticky header
      (function () {
        const headerEl = document.querySelector("#scrolly-1 header");
        const stickyEl = document.querySelector(".sticky-chart");
        const hh = headerEl.offsetHeight;
        stickyEl.style.top = hh + "px";
        stickyEl.style.height = `calc(100vh - ${hh}px)`;
      })();

      const data = [
        { name: "Inkoo", pct: 43, pop: 5600, lat: 60.05, lon: 24.0 },
        { name: "Kerava", pct: 41, pop: 37000, lat: 60.4, lon: 25.1 },
        { name: "Mäntsälä", pct: 36, pop: 21000, lat: 60.63, lon: 25.32 },
        { name: "Kirkkonummi", pct: 31, pop: 39000, lat: 60.13, lon: 24.43 },
        { name: "Järvenpää", pct: 23, pop: 43000, lat: 60.47, lon: 25.08 },
        { name: "Loviisa", pct: 23, pop: 15000, lat: 60.45, lon: 26.22 },
        { name: "Hyvinkää", pct: 22, pop: 46000, lat: 60.63, lon: 24.85 },
        { name: "Nurmijärvi", pct: 20, pop: 43000, lat: 60.47, lon: 24.8 },
        { name: "Karkkila", pct: 18, pop: 8500, lat: 60.53, lon: 24.22 },
        { name: "Porvoo", pct: 17, pop: 52000, lat: 60.39, lon: 25.66 },
        { name: "Lohja", pct: 17, pop: 48000, lat: 60.25, lon: 24.07 },
        { name: "Vihti", pct: 15, pop: 29000, lat: 60.42, lon: 24.35 },
        { name: "Sipoo", pct: 13, pop: 21000, lat: 60.37, lon: 25.27 },
        { name: "Kauniainen", pct: 46, pop: 10000, lat: 60.21, lon: 24.73 },
        { name: "Vantaa", pct: 24, pop: 244000, lat: 60.3, lon: 25.0 },
        { name: "Espoo", pct: 21, pop: 306000, lat: 60.21, lon: 24.66 },
        { name: "Helsinki", pct: 17, pop: 659000, lat: 60.17, lon: 24.94 },
      ];

      // How many pixels of scrolling per bubble reveal
      const STEP_PX = 200;

      // Make the scroll zone tall enough for all bubbles
      document.getElementById("scrolly-1").style.height =
        `calc(100vh + ${data.length * STEP_PX}px)`;

      const W = 1020,
        H = 560;
      const margin = { top: 20, right: 20, bottom: 20, left: 20 };

      const svg = d3
        .select("#chart")
        .append("svg")
        .attr("viewBox", `0 0 ${W} ${H}`)
        .attr("width", W)
        .attr("height", H);

      const mapW = W - margin.left - margin.right;
      const mapH = H - margin.top - margin.bottom;

      const projection = d3
        .geoMercator()
        .center([25.1, 60.35])
        .scale(22000)
        .translate([margin.left + mapW / 2, margin.top + mapH / 2]);

      const rScale = d3
        .scaleSqrt()
        .domain([0, d3.max(data, (d) => d.pop)])
        .range([0, 72]);

      const colorScale = d3
        .scaleSequential()
        .domain([0, d3.max(data, (d) => d.pct)])
        .interpolator(d3.interpolateBlues)
        .clamp(true);

      const compress = 0.75;
      const cx = margin.left + mapW / 2;
      const cy = margin.top + mapH / 2;
      data.forEach((d) => {
        const [px, py] = projection([d.lon, d.lat]);
        d.x = cx + (px - cx) * compress;
        d.y = cy + (py - cy) * compress;
        d.r = rScale(d.pop);
      });

      // Drawing order: largest pop first → drawn first → sits behind smaller bubbles
      data.sort((a, b) => b.pop - a.pop);

      const g = svg.append("g");

      const bubbles = g
        .selectAll(".bubble")
        .data(data)
        .join("circle")
        .attr("class", "bubble")
        .attr("cx", (d) => d.x)
        .attr("cy", (d) => d.y)
        .attr("r", 0)
        .attr("fill", (d) => colorScale(d.pct));

      const nameLabels = g
        .selectAll(".label-name")
        .data(data)
        .join("text")
        .attr("class", "label-name")
        .attr("x", (d) => d.x)
        .attr("y", (d) => d.y + d.r + 13)
        .attr("text-anchor", "middle")
        .attr("opacity", 0)
        .text((d) => d.name);

      const pctLabels = g
        .selectAll(".label-pct")
        .data(data)
        .join("text")
        .attr("class", "label-pct")
        .attr("x", (d) => d.x)
        .attr("y", (d) => d.y + d.r + 25)
        .attr("text-anchor", "middle")
        .attr("opacity", 0)
        .text((d) => `+${d.pct}%`);

      // Reveal order: highest pct first — maps scroll step → index in data/DOM
      // data is sorted by pop, so we need to find where each pct-ranked item sits
      const revealSequence = data
        .map((d, i) => ({ pct: d.pct, i }))
        .sort((a, b) => b.pct - a.pct)
        .map((item) => item.i);

      // --- Bar charts (pk-seutu and muu Uusimaa) ---
      const pkSeutuNames = new Set([
        "Helsinki",
        "Espoo",
        "Vantaa",
        "Kauniainen",
      ]);
      const dataPk = data
        .filter((d) => pkSeutuNames.has(d.name))
        .sort((a, b) => b.pct - a.pct);
      const dataUusimaa = data
        .filter((d) => !pkSeutuNames.has(d.name))
        .sort((a, b) => b.pct - a.pct);

      function drawBarChart(containerId, chartData, title) {
        const BW = 220;
        const mTop = 26,
          mRight = 38,
          mBottom = 6,
          mLeft = 82;
        const barH = 20,
          barPad = 7;
        const innerW = BW - mLeft - mRight;
        const innerH = chartData.length * (barH + barPad) - barPad;
        const BH = innerH + mTop + mBottom;

        const bSvg = d3
          .select(containerId)
          .append("svg")
          .attr("viewBox", `0 0 ${BW} ${BH}`)
          .attr("width", BW)
          .attr("height", BH);

        bSvg
          .append("text")
          .attr("x", mLeft)
          .attr("y", 16)
          .attr("font-size", "11px")
          .attr("font-weight", "600")
          .attr("fill", "#444")
          .text(title);

        const bG = bSvg
          .append("g")
          .attr("transform", `translate(${mLeft},${mTop})`);

        const xScale = d3
          .scaleLinear()
          .domain([0, d3.max(data, (d) => d.pct)])
          .range([0, innerW]);

        const yScale = d3
          .scaleBand()
          .domain(chartData.map((d) => d.name))
          .range([0, innerH])
          .paddingInner(barPad / (barH + barPad));

        bG.append("g")
          .call(d3.axisLeft(yScale).tickSize(0))
          .call((g) => g.select(".domain").remove())
          .call((g) =>
            g
              .selectAll("text")
              .attr("font-size", "10px")
              .attr("fill", "#333")
              .attr("x", -4),
          );

        bG.selectAll(".bar")
          .data(chartData)
          .join("rect")
          .attr("class", "bar")
          .attr("y", (d) => yScale(d.name))
          .attr("height", yScale.bandwidth())
          .attr("width", 0)
          .attr("fill", (d) => colorScale(d.pct))
          .attr("rx", 2)
          .attr("opacity", 0.75)
          .transition()
          .duration(500)
          .attr("width", (d) => xScale(d.pct));

        bG.selectAll(".val")
          .data(chartData)
          .join("text")
          .attr("class", "val")
          .attr("y", (d) => yScale(d.name) + yScale.bandwidth() / 2)
          .attr("dy", "0.35em")
          .attr("x", 2)
          .attr("font-size", "10px")
          .attr("font-weight", "700")
          .attr("fill", "#222")
          .text((d) => `+${d.pct}%`)
          .transition()
          .duration(500)
          .attr("x", (d) => xScale(d.pct) + 3);
      }

      drawBarChart("#chart-pk", dataPk, "Pääkaupunkiseutu");
      drawBarChart("#chart-uusimaa", dataUusimaa, "Muu Uusimaa");

      // --- SVG tooltip (positioned at data point, centered above bubble) ---
      const tipG = svg
        .append("g")
        .style("display", "none")
        .style("pointer-events", "none");
      const tipRect = tipG
        .append("rect")
        .attr("fill", "#fff")
        .attr("stroke", "#ddd")
        .attr("rx", 2);
      const tipText = tipG
        .append("text")
        .attr("text-anchor", "middle")
        .attr("font-size", "11px")
        .attr("fill", "#333");

      bubbles
        .on("mouseover", (event, d) => {
          tipText.text(d.pop.toLocaleString("fi-FI") + " asukasta");
          const bb = tipText.node().getBBox();
          const pad = 4;
          tipRect
            .attr("x", d.x - bb.width / 2 - pad)
            .attr("y", d.y - d.r - bb.height - pad * 2 - 4)
            .attr("width", bb.width + pad * 2)
            .attr("height", bb.height + pad * 2);
          tipText.attr("x", d.x).attr("y", d.y - d.r - pad - 4);
          tipG.style("display", null);
        })
        .on("mouseout", () => tipG.style("display", "none"));

      // --- Bar highlight state ---
      const revealedNames = new Set();

      function updateBarHighlight() {
        const allRevealed = revealedNames.size === data.length;
        d3.selectAll("#chart-pk .bar, #chart-uusimaa .bar")
          .transition().duration(200)
          .attr("opacity", (d) =>
            allRevealed ? 1 : revealedNames.has(d.name) ? 1 : 0.75
          );
      }

      // --- Reveal / hide functions ---
      // step = scroll position (0 = first revealed), i = DOM/data index
      function revealBubble(step) {
        const i = revealSequence[step];
        const d = data[i];
        revealedNames.add(d.name);
        updateBarHighlight();
        d3.select(bubbles.nodes()[i]).transition().duration(400).attr("r", d.r);
        nameLabels
          .filter((_, j) => j === i)
          .attr("y", d.y + d.r + 13)
          .transition()
          .duration(300)
          .delay(200)
          .attr("opacity", 1);
        pctLabels
          .filter((_, j) => j === i)
          .attr("y", d.y + d.r + 25)
          .transition()
          .duration(300)
          .delay(280)
          .attr("opacity", 1);
      }

      function hideBubble(step) {
        const i = revealSequence[step];
        revealedNames.delete(data[i].name);
        updateBarHighlight();
        d3.select(bubbles.nodes()[i]).transition().duration(300).attr("r", 0);
        nameLabels
          .filter((_, j) => j === i)
          .transition()
          .duration(200)
          .attr("opacity", 0);
        pctLabels
          .filter((_, j) => j === i)
          .transition()
          .duration(200)
          .attr("opacity", 0);
      }

      // --- Plain scroll listener ---
      let currentIndex = -1; // tracks how many bubbles are currently visible

      window.addEventListener("scroll", () => {
        const zoneTop = document
          .getElementById("scrolly-1")
          .getBoundingClientRect().top;
        const scrolled = Math.max(0, -zoneTop);

        // -1 when above the zone (nothing shown), 0..n-1 as we scroll down
        const upTo =
          scrolled === 0
            ? -1
            : Math.min(data.length - 1, Math.floor(scrolled / STEP_PX));

        if (upTo > currentIndex) {
          // scrolling down — reveal new bubbles
          for (let i = currentIndex + 1; i <= upTo; i++) revealBubble(i);
        } else if (upTo < currentIndex) {
          // scrolling up — hide bubbles that are no longer reached
          for (let i = currentIndex; i > upTo; i--) hideBubble(i);
        }

        currentIndex = upTo;
      });
    </script>
  </body>
</html>
