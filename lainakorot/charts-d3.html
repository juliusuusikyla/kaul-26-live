      const FI_MONTHS = [
        "tammi","helmi","maalis","huhti","touko","kesä",
        "heinä","elo","syys","loka","marras","joulu"
      ];

      function fiMonthFmt(d) {
        return FI_MONTHS[d.getMonth()];
      }

      function drawChart(containerId, rawData, opts) {
        const {
          title,          // string or [line1, line2]
          subtitle,       // string or null
          source = "Lähde: Suomen Pankki",
          svgWidth = 700,
          innerHeight = 265,
          xTickInterval = d3.timeMonth.every(1),
          xTickFmt = fiMonthFmt,
        } = opts;

        const titleArr = Array.isArray(title) ? title : [title];
        const titleLineH = 22;
        const titleH = titleArr.length * titleLineH;
        const subtitleH = subtitle ? 20 : 0;
        const margin = {
          top: 16 + titleH + subtitleH + 10,
          right: 72,
          bottom: 36,
          left: 46,
        };
        const sourceH = source ? 24 : 0;
        const svgHeight = margin.top + innerHeight + margin.bottom + sourceH;

        const parseDate = d3.timeParse("%Y-%m-%d");
        const data = rawData.map(d => ({
          date: parseDate(d.date),
          m3: +d.m3,
          m6: +d.m6,
          m12: +d.m12,
        }));

        const innerW = svgWidth - margin.left - margin.right;

        const svg = d3.select(`#${containerId}`)
          .append("svg")
          .attr("xmlns", "http://www.w3.org/2000/svg")
          .attr("width", svgWidth)
          .attr("height", svgHeight)
          .attr("viewBox", `0 0 ${svgWidth} ${svgHeight}`);

        // ── Title ──────────────────────────────────────────────────
        const titleG = svg.append("text")
          .attr("font-family", "Arial, Helvetica, sans-serif")
          .attr("font-size", "17")
          .attr("font-weight", "bold")
          .attr("fill", "#1a1a2e");

        titleArr.forEach((line, i) => {
          titleG.append("tspan")
            .attr("x", margin.left)
            .attr("y", 16 + titleLineH + i * titleLineH)
            .text(line);
        });

        if (subtitle) {
          svg.append("text")
            .attr("x", margin.left)
            .attr("y", 16 + titleH + titleLineH + subtitleH - 4)
            .attr("font-family", "Arial, Helvetica, sans-serif")
            .attr("font-size", "12")
            .attr("fill", "#888")
            .text(subtitle);
        }

        // ── Chart area ─────────────────────────────────────────────
        const g = svg.append("g")
          .attr("transform", `translate(${margin.left},${margin.top})`);

        // ── Scales ─────────────────────────────────────────────────
        const x = d3.scaleTime()
          .domain(d3.extent(data, d => d.date))
          .range([0, innerW]);

        const allVals = data.flatMap(d => [d.m3, d.m6, d.m12]);
        const y = d3.scaleLinear()
          .domain([d3.min(allVals), d3.max(allVals)])
          .range([innerHeight, 0])
          .nice();

        // ── Horizontal grid lines ───────────────────────────────────
        g.selectAll(".grid")
          .data(y.ticks(5))
          .join("line")
          .attr("x1", 0).attr("x2", innerW)
          .attr("y1", d => y(d)).attr("y2", d => y(d))
          .attr("stroke", "#ebebeb")
          .attr("stroke-width", 1);

        // ── Axes ────────────────────────────────────────────────────
        // X
        const xAxisG = g.append("g")
          .attr("transform", `translate(0,${innerHeight})`)
          .call(
            d3.axisBottom(x)
              .ticks(xTickInterval)
              .tickFormat(xTickFmt)
              .tickSizeOuter(0)
              .tickSizeInner(4)
          );
        xAxisG.select(".domain").attr("stroke", "#ccc");
        xAxisG.selectAll(".tick line").attr("stroke", "#ccc");
        xAxisG.selectAll("text")
          .attr("font-family", "Arial, Helvetica, sans-serif")
          .attr("font-size", "11")
          .attr("fill", "#888");

        // Y
        const yAxisG = g.append("g")
          .call(
            d3.axisLeft(y)
              .ticks(5)
              .tickFormat(d => d.toFixed(2) + " %")
              .tickSizeOuter(0)
              .tickSizeInner(0)
          );
        yAxisG.select(".domain").remove();
        yAxisG.selectAll("text")
          .attr("font-family", "Arial, Helvetica, sans-serif")
          .attr("font-size", "11")
          .attr("fill", "#888")
          .attr("dx", "-3");

        // ── Lines ───────────────────────────────────────────────────
        const lineGen = (key) =>
          d3.line()
            .x(d => x(d.date))
            .y(d => y(d[key]))
            .curve(d3.curveStepAfter)(data);

        const SERIES = [
          { key: "m3",  label: "3 kk",  color: "#c0c0c0", sw: 1.5 },
          { key: "m6",  label: "6 kk",  color: "#c0c0c0", sw: 1.5 },
          { key: "m12", label: "12 kk", color: "#c0392b", sw: 2.5 },
        ];

        SERIES.forEach(s => {
          g.append("path")
            .attr("fill", "none")
            .attr("stroke", s.color)
            .attr("stroke-width", s.sw)
            .attr("stroke-linejoin", "round")
            .attr("stroke-linecap", "round")
            .attr("d", lineGen(s.key));
        });

        // ── Dots on red (12 kk) line: first, max, last ──────────────
        const first12 = data[0];
        const last12  = data[data.length - 1];
        const max12   = data.reduce((best, d) => d.m12 > best.m12 ? d : best, data[0]);

        // Deduplicate in case first/last coincide with max
        const dotPoints = [first12, max12, last12]
          .filter((d, i, arr) => arr.findIndex(p => p.date === d.date) === i);

        dotPoints.forEach(d => {
          const cx = x(d.date);
          const cy = y(d.m12);

          // ── Vertical placement: above unless too close to top edge ──
          const above = cy > 38;
          const labelDy = above ? -10 : 16;

          // ── Horizontal anchor: guard against left/right edges ───────
          const anchor = cx < 50 ? "start" : cx > innerW - 50 ? "end" : "middle";
          const labelDx = cx < 50 ? 4 : cx > innerW - 50 ? -4 : 0;

          // White halo
          g.append("circle")
            .attr("cx", cx).attr("cy", cy).attr("r", 5).attr("fill", "#fff");
          // Coloured dot
          g.append("circle")
            .attr("cx", cx).attr("cy", cy).attr("r", 3.5).attr("fill", "#c0392b");
          // Value label
          g.append("text")
            .attr("x", cx + labelDx)
            .attr("y", cy + labelDy)
            .attr("text-anchor", anchor)
            .attr("font-family", "Arial, Helvetica, sans-serif")
            .attr("font-size", "12")
            .attr("font-weight", "bold")
            .attr("fill", "#c0392b")
            .text(d.m12.toFixed(2).replace(".", ",") + "\u00a0%");
        });

        // ── End labels (with collision nudge) ───────────────────────
        const last = data[data.length - 1];
        const labelX = x(last.date) + 7;

        // Build sorted label positions, nudge overlaps
        const MIN_GAP = 13;
        let labels = SERIES.map(s => ({
          ...s,
          rawY: y(last[s.key]),
          nudgedY: y(last[s.key]),
        })).sort((a, b) => a.rawY - b.rawY); // top to bottom

        // Downward pass: push down any that are too close
        for (let i = 1; i < labels.length; i++) {
          if (labels[i].nudgedY < labels[i - 1].nudgedY + MIN_GAP) {
            labels[i].nudgedY = labels[i - 1].nudgedY + MIN_GAP;
          }
        }
        // Upward pass: push up if out of bounds
        for (let i = labels.length - 2; i >= 0; i--) {
          if (labels[i].nudgedY > labels[i + 1].nudgedY - MIN_GAP) {
            labels[i].nudgedY = labels[i + 1].nudgedY - MIN_GAP;
          }
        }

        labels.forEach(s => {
          g.append("text")
            .attr("x", labelX)
            .attr("y", s.nudgedY)
            .attr("dy", "0.35em")
            .attr("font-family", "Arial, Helvetica, sans-serif")
            .attr("font-size", "12")
            .attr("font-weight", s.key === "m12" ? "bold" : "normal")
            .attr("fill", s.color)
            .text(s.label);
        });

        // ── Source ──────────────────────────────────────────────────
        if (source) {
          svg.append("text")
            .attr("x", margin.left)
            .attr("y", svgHeight - 6)
            .attr("font-family", "Arial, Helvetica, sans-serif")
            .attr("font-size", "11")
            .attr("fill", "#bbb")
            .text(source);
        }
      }

      // ── Chart 1: full range ──────────────────────────────────────
      drawChart("chart1", DATA, {
        title: [
          "Korot nousussa \u2013 12kk euribor kuitenkin",
          "viittaa tulevaan laskuun"
        ],
        subtitle: "3, 6 ja 12 kuukauden euribor, %",
        xTickInterval: d3.timeMonth.every(1),
        xTickFmt: fiMonthFmt,
      });

      // ── Chart 2: from Sep 29 peak to end ────────────────────────
      const peakDate = "2023-09-29";
      drawChart("chart2", DATA.filter(d => d.date >= peakDate), {
        title: "Pitkät korot laskussa syyskuun huippulukemista",
        subtitle: "3, 6 ja 12 kuukauden euribor, %",
        xTickInterval: d3.timeMonth.every(1),
        xTickFmt: fiMonthFmt,
      });
    </script>
