<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kaul Tehtävät</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #f5f5f5;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        text-align: center;
      }

      h1 {
        font-size: 2rem;
        color: #222;
        margin-bottom: 2.5rem;
        font-weight: 600;
      }

      .links {
        display: flex;
        gap: 1.5rem;
        justify-content: center;
      }

      .link-card {
        display: block;
        padding: 2rem 3rem;
        background: #fff;
        text-decoration: none;
        color: #333;
        font-size: 1.1rem;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Julius Uusikylä ennakkotehtävät</h1>
      <div class="links">
        <a href="asuntokaupat/" class="link-card"> Asuntokaupat </a>
        <a href="lainakorot/" class="link-card"> Lainakorot </a>
      </div>
    </div>
  </body>
</html>
